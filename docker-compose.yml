# Docker Compose - Backend Music NestJS
# ======================================
# Este archivo es para desarrollo individual del servicio.
# Para levantar todo el monorepo, usar el docker-compose.yml de la raíz.
#
# Uso:
#   docker-compose up -d                    # Solo bases de datos (PostgreSQL + Redis)
#   docker-compose --profile app up -d      # Incluir NestJS en contenedor
#   docker-compose --profile dev up -d      # Modo desarrollo con hot reload

services:
  # ============================================
  # BASES DE DATOS
  # ============================================

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-music_app_postgres}
    restart: ${POSTGRES_RESTART:-unless-stopped}
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-music_app}
      PGDATA: ${PGDATA:-/var/lib/postgresql/data/pgdata}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - music_app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-music_app}"]
      interval: ${POSTGRES_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${POSTGRES_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${POSTGRES_HEALTHCHECK_RETRIES:-5}
      start_period: ${POSTGRES_HEALTHCHECK_START_PERIOD:-10s}
    deploy:
      resources:
        limits:
          cpus: ${POSTGRES_CPU_LIMIT:-1.0}
          memory: ${POSTGRES_MEMORY_LIMIT:-512M}
        reservations:
          cpus: ${POSTGRES_CPU_RESERVATION:-0.5}
          memory: ${POSTGRES_MEMORY_RESERVATION:-256M}

  # Redis Cache para NestJS
  redis:
    image: redis:${REDIS_VERSION:-7}-alpine
    container_name: ${REDIS_CONTAINER_NAME:-music_app_redis}
    restart: ${REDIS_RESTART:-unless-stopped}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: redis-server --appendonly ${REDIS_APPENDONLY:-yes} ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - music_app_network
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi' | grep -q PONG || exit 1"]
      interval: ${REDIS_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${REDIS_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${REDIS_HEALTHCHECK_RETRIES:-5}
      start_period: ${REDIS_HEALTHCHECK_START_PERIOD:-10s}
    deploy:
      resources:
        limits:
          cpus: ${REDIS_CPU_LIMIT:-0.5}
          memory: ${REDIS_MEMORY_LIMIT:-256M}
        reservations:
          cpus: ${REDIS_CPU_RESERVATION:-0.25}
          memory: ${REDIS_MEMORY_RESERVATION:-128M}

  # ============================================
  # APLICACIÓN NESTJS
  # ============================================

  # NestJS Application - Producción
  # Usar: docker-compose --profile app up -d
  app:
    profiles:
      - app
    build:
      context: ${DOCKER_BUILD_CONTEXT:-.}
      dockerfile: ${DOCKERFILE:-Dockerfile}
      target: ${DOCKER_BUILD_TARGET:-production}
    container_name: ${APP_CONTAINER_NAME:-music_app_backend}
    restart: ${APP_RESTART:-unless-stopped}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      API_PREFIX: ${API_PREFIX:-api}
      # Database
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-music_app}
      DATABASE_URI: ${DATABASE_URI:-}
      # Redis
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_TTL: ${REDIS_TTL:-3600}
      REDIS_URL: ${REDIS_URL:-}
      # YTMusic Service - IMPORTANTE: URL para comunicarse con FastAPI
      YTMUSIC_SERVICE_URL: ${YTMUSIC_SERVICE_URL:-http://music_services:8000}
      # JWT Authentication
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - "${PORT:-3000}:3000"
    networks:
      - music_app_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/$${API_PREFIX:-api}/health || exit 1"]
      interval: ${APP_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${APP_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${APP_HEALTHCHECK_RETRIES:-3}
      start_period: ${APP_HEALTHCHECK_START_PERIOD:-40s}

  # NestJS Application - Desarrollo con hot reload
  # Usar: docker-compose --profile dev up -d
  app_dev:
    profiles:
      - dev
    build:
      context: ${DOCKER_BUILD_CONTEXT:-.}
      dockerfile: ${DOCKERFILE:-Dockerfile}
      target: development
    container_name: ${APP_CONTAINER_NAME:-music_app_backend_dev}
    restart: ${APP_RESTART:-unless-stopped}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: ${PORT:-3000}
      API_PREFIX: ${API_PREFIX:-api}
      # Database
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-music_app}
      DATABASE_URI: ${DATABASE_URI:-}
      # Redis
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_TTL: ${REDIS_TTL:-3600}
      REDIS_URL: ${REDIS_URL:-}
      # YTMusic Service
      YTMUSIC_SERVICE_URL: ${YTMUSIC_SERVICE_URL:-http://localhost:8000}
      # JWT Authentication
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ${APP_VOLUME_SOURCE:-.}:${APP_VOLUME_TARGET:-/app}
      - /app/node_modules
      - /app/dist
    networks:
      - music_app_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/$${API_PREFIX:-api}/health || exit 1"]
      interval: ${APP_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${APP_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${APP_HEALTHCHECK_RETRIES:-3}
      start_period: ${APP_HEALTHCHECK_START_PERIOD:-40s}

networks:
  music_app_network:
    driver: ${DOCKER_NETWORK_DRIVER:-bridge}
    name: ${DOCKER_NETWORK_NAME:-music_app_network}

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-music_app_postgres_data}
  redis_data:
    name: ${REDIS_VOLUME_NAME:-music_app_redis_data}
